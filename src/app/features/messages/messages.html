<section class="messages-page">
  <header class="messages-header">
    <h2>Messagerie acheteurs-vendeur</h2>
    <p>Répondez aux questions des clients sur les commandes et produits.</p>
  </header>

  <div class="messages-layout" *ngIf="conversations.length > 0; else emptyState">
    <aside class="conversation-list">
      <button
        type="button"
        class="conversation-item"
        *ngFor="let conv of conversations; trackBy: trackByConversation"
        [class.selected]="conv.id === selectedConversationId"
        (click)="selectConversation(conv.id)"
      >
        <div class="conversation-top">
          <strong>{{ conv.userName }}</strong>
          <span class="timestamp">{{ conv.lastMessageAt | date:'shortTime' }}</span>
        </div>
        <p class="subject">{{ conv.subject }}</p>
        <p class="meta">
          <span *ngIf="conv.productTitle">Produit: {{ conv.productTitle }}</span>
          <span *ngIf="conv.orderId">Commande: {{ conv.orderId }}</span>
        </p>
        <span class="unread-badge" *ngIf="unreadFor(conv) > 0">{{ unreadFor(conv) }}</span>
      </button>
    </aside>

    <section class="thread" *ngIf="selectedConversation as active">
      <header class="thread-header">
        <h3>{{ active.userName }}</h3>
        <p>{{ active.subject }}</p>
      </header>

      <div class="thread-messages">
        <article
          *ngFor="let msg of active.messages"
          class="bubble"
          [ngClass]="msg.senderRole === 'vendor' ? 'bubble-vendor' : 'bubble-user'"
        >
          <p class="bubble-meta">
            {{ msg.senderName }} · {{ msg.sentAt | date:'short' }}
          </p>
          <p class="bubble-content">{{ msg.content }}</p>
        </article>
      </div>

      <form class="reply-form" (ngSubmit)="sendReply()">
        <label for="replyDraft">Répondre</label>
        <textarea
          id="replyDraft"
          name="replyDraft"
          [(ngModel)]="replyDraft"
          rows="3"
          placeholder="Écrire un message..."
        ></textarea>
        <button type="submit">Envoyer</button>
      </form>
    </section>
  </div>
</section>

<ng-template #emptyState>
  <p class="empty-state">Aucune conversation pour le moment.</p>
</ng-template>
