<div class="form-container">
  <h2>{{ isEditMode ? 'Modifier le produit' : 'Ajouter un produit' }}</h2>

  <p *ngIf="loading" class="loading-hint">Chargement du produit…</p>

  <form *ngIf="!loading" [formGroup]="form" (ngSubmit)="onSubmit()" class="product-form" novalidate>
    <div class="form-row">
      <div class="form-group">
        <label for="sku">SKU (optionnel)</label>
        <input id="sku" type="text" formControlName="sku" class="form-control" placeholder="SKU-ABCD-1234" />
      </div>
      <div class="form-group">
        <label for="status">Statut *</label>
        <select id="status" formControlName="status" class="form-control">
          <option *ngFor="let status of statusOptions" [value]="status">{{ status }}</option>
        </select>
      </div>
    </div>

    <div class="form-group image-section">
      <label>Image du produit</label>

      <div class="image-preview-container" *ngIf="imagePreview">
        <img [src]="imagePreview" alt="Aperçu" class="image-preview" />
        <button type="button" class="btn-clear-image" (click)="clearImage()" title="Supprimer l'image">
          ✕
        </button>
      </div>

      <div class="file-input-wrapper" *ngIf="!imagePreview">
        <input 
          type="file" 
          id="image-input" 
          accept="image/*" 
          (change)="onImageSelected($event)"
          class="file-input"
        />
        <label for="image-input" class="file-label">
          📷 Cliquer pour ajouter une image
        </label>
        <p class="file-hint">Formats acceptés : JPG, PNG, WebP (max 5MB)</p>
      </div>

      <label for="imageUrl">URL image principale</label>
      <input
        id="imageUrl"
        type="url"
        formControlName="image"
        class="form-control"
        placeholder="https://..."
        (blur)="applyImageUrl()"
      />

    </div>

    <div class="form-group">
      <label for="name">Nom *</label>
      <input id="name" type="text" formControlName="name" class="form-control"
             [class.is-invalid]="f['name'].invalid && submitted" />
      <small class="error" *ngIf="f['name'].invalid && submitted">Le nom est requis.</small>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="price">Prix (€) *</label>
        <input id="price" type="number" step="0.01" formControlName="price" class="form-control"
               [class.is-invalid]="f['price'].invalid && submitted" />
        <small class="error" *ngIf="f['price'].invalid && submitted">
          Prix requis et doit être supérieur à 0.
        </small>
      </div>

      <div class="form-group">
        <label for="stock">Stock *</label>
        <input id="stock" type="number" formControlName="stock" class="form-control"
               [class.is-invalid]="f['stock'].invalid && submitted" />
        <small class="error" *ngIf="f['stock'].invalid && submitted">
          Stock requis et doit être >= 0.
        </small>
      </div>

      <div class="form-group">
        <label for="lowStockThreshold">Seuil stock bas *</label>
        <input id="lowStockThreshold" type="number" formControlName="lowStockThreshold" class="form-control"
               [class.is-invalid]="f['lowStockThreshold'].invalid && submitted" />
        <small class="error" *ngIf="f['lowStockThreshold'].invalid && submitted">
          Seuil requis et doit être >= 0.
        </small>
      </div>
    </div>

    <div class="form-group">
      <label for="category">Catégorie *</label>
      <input id="category" type="text" formControlName="category" class="form-control"
             [class.is-invalid]="f['category'].invalid && submitted" />
      <small class="error" *ngIf="f['category'].invalid && submitted">La catégorie est requise.</small>
    </div>

    <div class="form-group">
      <label for="gallery">Galerie (URLs séparées par ligne ou virgule)</label>
      <textarea
        id="gallery"
        rows="3"
        formControlName="gallery"
        class="form-control"
        placeholder="https://...&#10;https://..."
      ></textarea>
    </div>

    <div class="form-group">
      <label for="description">Description (optionnel)</label>
      <textarea id="description" rows="4" formControlName="description" class="form-control"></textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">{{ isEditMode ? 'Mettre à jour' : 'Ajouter' }}</button>
      <button type="button" class="btn btn-secondary" (click)="onCancel()">Annuler</button>
    </div>
  </form>
</div>
