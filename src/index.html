<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Amaz Vendeurs</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function () {
      try {
        var preference = localStorage.getItem('amaz_theme_preference');
        if (preference === 'light' || preference === 'dark') {
          document.documentElement.dataset.theme = preference;
        } else {
          delete document.documentElement.dataset.theme;
        }
      } catch (_) {}
    })();
  </script>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <app-root></app-root>
</body>
</html>
